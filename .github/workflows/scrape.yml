name: Scraper InmoStats

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      max_runtime_seconds:
        description: "Limite de tiempo para esta corrida (segundos)"
        required: false
        default: "1200"

concurrency:
  group: fincaraiz-scraper
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests beautifulsoup4 lxml pandas

      - name: Scrapear un tramo de la corrida nacional
        run: python -m src.scraper.fincaraiz_scraper
        env:
          MAX_RUNTIME_SECONDS: ${{ github.event.inputs.max_runtime_seconds || '1200' }}
          MIN_HOURS_BETWEEN_RUNS: "24"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Recalcular estadisticas agregadas
        run: python -m src.pipelines.compute_stats

      - name: Guardar datos y checkpoint nuevos
        run: |
          git config user.name "inmostats-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/raw/ data/processed/stats_summary.json
          git diff --cached --quiet || git commit -m "scrape: actualiza datos crudos y checkpoint"
          git push

      - name: Notificar fallo por Telegram
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "parse_mode=HTML" \
            --data-urlencode $'text=🚨 <b>InmoStats</b> — el workflow de GitHub Actions fallo.\nRevisa: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
