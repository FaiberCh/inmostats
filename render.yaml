# Blueprint de Render para la API (src/api/). Deploy: conectar el repo en
# Render > New > Blueprint. El build entrena el modelo desde cero (data/raw/
# SI esta versionado en git) porque models/*.joblib y feature_config.json
# estan gitignored a proposito -son artefactos derivados, no codigo fuente.
services:
  - type: web
    name: inmostats-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python -m src.training.train_baseline"
    startCommand: "uvicorn src.api.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
